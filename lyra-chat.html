<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyra ✦</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lyra: #818cf8;
      --lyra-dim: #4f46e5;
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --text: #e2e2f0;
      --muted: #6b6b8a;
      --user-bubble: #1e1e2e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--lyra), var(--lyra-dim));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(129,140,248,0.3);
    }

    header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 8px #4ade80;
    }
    .status-dot.offline { background: var(--muted); box-shadow: none; }

    /* ── API key banner ── */
    #api-banner {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #api-banner label { font-size: 13px; color: var(--muted); white-space: nowrap; }

    #api-key-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    #api-key-input:focus { border-color: var(--lyra); }

    #save-key {
      background: var(--lyra);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #save-key:hover { opacity: 0.85; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .lyra-avatar {
      background: linear-gradient(135deg, var(--lyra), var(--lyra-dim));
      box-shadow: 0 0 12px rgba(129,140,248,0.25);
    }

    .user-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.lyra .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2d2d44;
      border-top-right-radius: 4px;
      color: #c8c8e8;
    }

    /* ── Typing indicator ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing span {
      width: 6px; height: 6px;
      background: var(--lyra);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.6;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* ── Welcome ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      text-align: center;
      color: var(--muted);
      padding: 40px;
    }
    #welcome .big-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--lyra), var(--lyra-dim));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px rgba(129,140,248,0.2);
      margin-bottom: 8px;
    }
    #welcome h2 { font-size: 22px; color: var(--text); font-weight: 600; }
    #welcome p  { font-size: 14px; max-width: 360px; line-height: 1.6; }

    /* ── Input area ── */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 200px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: var(--lyra); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 48px; height: 48px;
      background: var(--lyra);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:active:not(:disabled) { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    .hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 8px; }

    code {
      background: #1e1e2e;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      color: var(--lyra);
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">✦</div>
  <div>
    <h1>Lyra</h1>
    <p>Personal AI · Local Intelligence</p>
  </div>
  <div class="status-dot offline" id="status-dot"></div>
</header>

<!-- API Key Banner -->
<div id="api-banner">
  <label for="api-key-input">Anthropic API Key</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
  <button id="save-key">Connect</button>
</div>

<!-- Messages -->
<div id="messages">
  <div id="welcome">
    <div class="big-logo">✦</div>
    <h2>Hi, I'm Lyra</h2>
    <p>Enter your Anthropic API key above to connect, then say anything. I'm here to think with you.</p>
  </div>
</div>

<!-- Input -->
<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Say something..." rows="1" disabled></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">Enter ↵ to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<script>
  const SYSTEM_PROMPT = `You are Lyra, an advanced personal AI assistant running entirely on the user's own hardware.

You are:
- Deeply intelligent and genuinely curious
- Direct, clear, and confident — you say what you think
- Warm and personable, but never sycophantic
- Capable of nuanced, multi-step reasoning across all domains
- Context-aware: you build understanding across the conversation
- Honest about uncertainty — you distinguish what you know from what you infer

Your capabilities:
- Deep analysis, reasoning, and synthesis
- Code generation, debugging, and system design
- Document and file analysis
- Long-form writing, editing, and research
- Math, science, logic, philosophy, and creative work

You are Lyra — not a chatbot, not an assistant in the generic sense.
You are a capable intelligence that thinks carefully before speaking.
You give responses that are genuinely useful — specific, grounded, honest.

Privacy note: You run locally. The user's data stays on their machine.`;

  let apiKey = localStorage.getItem('lyra_api_key') || '';
  let history = [];
  let busy = false;

  const keyInput   = document.getElementById('api-key-input');
  const saveBtn    = document.getElementById('save-key');
  const messages   = document.getElementById('messages');
  const welcome    = document.getElementById('welcome');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');

  // Restore key
  if (apiKey) {
    keyInput.value = apiKey;
    activate();
  }

  saveBtn.addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k.startsWith('sk-ant-')) return alert('Please enter a valid Anthropic API key (starts with sk-ant-)');
    apiKey = k;
    localStorage.setItem('lyra_api_key', k);
    activate();
  });

  function activate() {
    userInput.disabled = false;
    sendBtn.disabled   = false;
    statusDot.classList.remove('offline');
    userInput.focus();
  }

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function send() {
    const text = userInput.value.trim();
    if (!text || busy || !apiKey) return;

    if (welcome) welcome.remove();

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    userInput.value = '';
    userInput.style.height = 'auto';

    streamLyra();
  }

  function appendMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'lyra' ? 'lyra-avatar' : 'user-avatar'}`;
    av.textContent = role === 'lyra' ? '✦' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg lyra';
    wrap.id = 'typing-indicator';

    const av = document.createElement('div');
    av.className = 'avatar lyra-avatar';
    av.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function streamLyra() {
    busy = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2048,
          system: SYSTEM_PROMPT,
          stream: true,
          messages: history,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      removeTyping();
      const bubble = appendMsg('lyra', '');
      let full = '';

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            if (json.type === 'content_block_delta' && json.delta?.text) {
              full += json.delta.text;
              bubble.textContent = full;
              messages.scrollTop = messages.scrollHeight;
            }
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: full });

    } catch (err) {
      removeTyping();
      appendMsg('lyra', `⚠ Error: ${err.message}`);
    } finally {
      busy = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }
</script>
</body>
</html>
