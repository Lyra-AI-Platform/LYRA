<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Sign In — LyraAuth</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .auth-card {
      width:100%; max-width:400px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:36px;
      box-shadow:0 4px 24px rgba(0,0,0,0.06);
    }
    .auth-logo { font-size:.9375rem; font-weight:600; color:var(--text); margin-bottom:28px; }
    .auth-card h1 { font-size:1.375rem; margin-bottom:6px; }
    .auth-card > p { font-size:.875rem; margin-bottom:28px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:6px; }
    .field input {
      width:100%; padding:10px 14px;
      border:1px solid var(--border-hi); border-radius:7px;
      font-size:.9375rem; font-family:inherit;
      background:var(--bg); color:var(--text); outline:none;
    }
    .field input:focus { border-color:var(--text); }
    .auth-btn {
      width:100%; padding:11px; margin-top:8px;
      background:var(--text); color:var(--bg);
      border:none; border-radius:7px;
      font-size:.9375rem; font-weight:600; cursor:pointer; font-family:inherit;
    }
    .auth-btn:disabled { opacity:.5; cursor:not-allowed; }
    .auth-footer { margin-top:20px; text-align:center; font-size:.8125rem; color:var(--muted); }
    .auth-footer a { color:var(--text); font-weight:500; }
    .error-box {
      background:#fef2f2; border:1px solid #fca5a5;
      border-radius:7px; padding:10px 14px;
      font-size:.8125rem; color:#dc2626; margin-bottom:14px; display:none;
    }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">✦ LyraAuth</div>
  <h1>Sign in</h1>
  <p>Welcome back. Sign in to manage your API keys.</p>

  <div class="error-box" id="error"></div>

  <form id="login-form" novalidate>
    <div class="field">
      <label>Email</label>
      <input type="text" id="email" autocomplete="email" inputmode="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <button type="submit" class="auth-btn" id="submit-btn">Sign in</button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="register.html">Create one free</a>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('lyra_token')) {
    window.location.href = 'index.html';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn    = document.getElementById('submit-btn');
    const errBox = document.getElementById('error');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    function showErr(msg) {
      errBox.textContent = msg;
      errBox.style.display = 'block';
    }
    errBox.style.display = 'none';

    if (!email)    { showErr('Please enter your email address.'); return; }
    if (!password) { showErr('Please enter your password.');      return; }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        const msg = typeof data.detail === 'string'
          ? data.detail
          : Array.isArray(data.detail)
            ? data.detail[0]?.msg || 'Login failed.'
            : 'Login failed.';
        throw new Error(msg);
      }
      localStorage.setItem('lyra_token', data.token);
      localStorage.setItem('lyra_user', JSON.stringify(data.user));
      window.location.href = 'index.html';
    } catch (ex) {
      showErr(ex.message);
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
